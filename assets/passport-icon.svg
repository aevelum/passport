<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="Aevelum Passport globe logo mark">
  <title>Aevelum Passport globe logo mark</title>
  <desc>A refined Passport globe mark on a light institutional icon surface with a transparent surround outside the rounded slate ring.</desc>
  <defs>
    <linearGradient id="surface" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F4"/>
    </linearGradient>
    <linearGradient id="globeNavy" x1="164" y1="164" x2="860" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#07111A"/>
    </linearGradient>
    <filter id="markShadow" x="84" y="84" width="856" height="856" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="24" flood-color="#07111A" flood-opacity="0.14" stdDeviation="22"/>
    </filter>
  </defs>

  <rect x="46" y="46" width="932" height="932" rx="182" fill="url(#surface)"/>
  <rect x="40" y="40" width="944" height="944" rx="188" stroke="#CBD5E1" stroke-opacity="0.95" stroke-width="18"/>

  <g filter="url(#markShadow)">
    <path d="M512 176 C352 338 352 686 512 848 C672 686 672 338 512 176" stroke="#0B1F3A" stroke-opacity="0.18" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M196 512 H828" stroke="#BD9B6B" stroke-width="62" stroke-linecap="round"/>
    <path d="M270 388 H754" stroke="#BD9B6B" stroke-opacity="0.82" stroke-width="50" stroke-linecap="round"/>
    <path d="M270 636 H754" stroke="#BD9B6B" stroke-opacity="0.82" stroke-width="50" stroke-linecap="round"/>
    <circle cx="512" cy="512" r="330" stroke="url(#globeNavy)" stroke-width="72"/>
  </g>
</svg>
