<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none" role="img" aria-label="Aevelum Passport README banner">
  <title>Aevelum Passport README banner</title>
  <desc>A light README banner for Aevelum Passport with large readable tagline text and a simplified credential account diagram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F4"/>
    </linearGradient>
    <linearGradient id="iconSurface" x1="0" y1="0" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F4"/>
    </linearGradient>
    <linearGradient id="globeNavy" x1="16" y1="16" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#07111A"/>
    </linearGradient>
    <linearGradient id="lineGold" x1="810" y1="190" x2="1185" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BD9B6B" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#5F6673" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" flood-color="#07111A" flood-opacity="0.12" stdDeviation="20"/>
    </filter>
    <clipPath id="globeInterior">
      <circle cx="56" cy="56" r="36"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="80" y="80" width="1120" height="480" stroke="#CBD5E1" stroke-opacity="0.72" stroke-width="1"/>
  <rect x="0" y="634" width="1280" height="6" fill="#BD9B6B" opacity="0.68"/>

  <g transform="translate(96, 118)">
    <rect x="4" y="4" width="104" height="104" rx="22" fill="url(#iconSurface)"/>
    <rect x="3" y="3" width="106" height="106" rx="23" stroke="#CBD5E1" stroke-opacity="0.95" stroke-width="2.4"/>
    <g clip-path="url(#globeInterior)">
      <path d="M56 16 C39 34 39 78 56 96 C73 78 73 34 56 16" stroke="#0B1F3A" stroke-opacity="0.18" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 56 H91" stroke="#BD9B6B" stroke-width="6.4"/>
      <path d="M28 42 H84" stroke="#BD9B6B" stroke-opacity="0.82" stroke-width="5.2" stroke-linecap="round"/>
      <path d="M28 70 H84" stroke="#BD9B6B" stroke-opacity="0.82" stroke-width="5.2" stroke-linecap="round"/>
    </g>
    <circle cx="56" cy="56" r="36" stroke="url(#globeNavy)" stroke-width="6.8"/>
  </g>

  <text x="232" y="194" font-family="'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="54" font-weight="700" fill="#07111A">aevelum</text>
  <text x="478" y="194" font-family="'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="54" font-weight="700" fill="#BD9B6B">passport</text>

  <text x="96" y="316" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif" font-size="58" font-weight="800" fill="#07111A">
    Confidential collateral.
  </text>
  <text x="96" y="386" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif" font-size="58" font-weight="800" fill="#07111A">
    Confident execution.
  </text>
  <text x="100" y="460" font-family="'Inter', 'SF Pro', -apple-system, system-ui, sans-serif" font-size="30" font-weight="500" fill="#343741">
    Canton-native repo collateral credentials.
  </text>

  <g transform="translate(810, 190) scale(0.88)">
    <g stroke="url(#lineGold)" stroke-width="3.5" stroke-linecap="round">
      <path d="M54 84 H138"/>
      <path d="M54 236 H138"/>
      <path d="M292 84 H374"/>
      <path d="M292 236 H374"/>
    </g>

    <g fill="#FFFFFF" stroke-width="2.2">
      <rect x="0" y="50" width="96" height="68" rx="14" stroke="#BD9B6B"/>
      <rect x="0" y="202" width="96" height="68" rx="14" stroke="#BD9B6B"/>
      <rect x="330" y="50" width="96" height="68" rx="14" stroke="#CBD5E1"/>
      <rect x="330" y="202" width="96" height="68" rx="14" stroke="#CBD5E1"/>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="118" y="24" width="194" height="272" rx="26" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.2"/>
      <rect x="150" y="62" width="130" height="8" rx="4" fill="#0B1F3A"/>
      <rect x="164" y="84" width="102" height="8" rx="4" fill="#5F6673" opacity="0.68"/>
      <rect x="146" y="118" width="138" height="54" rx="12" fill="#F8FAFC" stroke="#BD9B6B" stroke-width="2.2"/>
      <rect x="166" y="139" width="98" height="12" rx="6" fill="#BD9B6B"/>
      <rect x="146" y="196" width="138" height="54" rx="12" fill="#F8FAFC" stroke="#5F6673" stroke-width="2.2"/>
      <rect x="166" y="217" width="98" height="12" rx="6" fill="#5F6673"/>
    </g>

    <circle cx="108" cy="84" r="5" fill="#BD9B6B"/>
    <circle cx="108" cy="236" r="5" fill="#BD9B6B" opacity="0.82"/>
    <circle cx="322" cy="84" r="5" fill="#5F6673" opacity="0.54"/>
    <circle cx="322" cy="236" r="5" fill="#5F6673" opacity="0.46"/>
  </g>
</svg>
