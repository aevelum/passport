name: ci

on:
  push:
  pull_request:

jobs:
  local-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install DPM
        run: |
          curl https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"
      - name: Install pinned Daml SDK
        run: dpm install 3.5.1-rc3
      - name: Run local CI gates
        run: npm run ci
