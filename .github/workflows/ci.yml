name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  local-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/cache@v5
        with:
          path: ~/.dpm/cache
          key: dpm-${{ runner.os }}-3.4.11

      - name: Install DPM
        run: |
          curl -fsSL https://get.digitalasset.com/install/install.sh -o /tmp/install-dpm.sh
          sh /tmp/install-dpm.sh
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"

      - name: Install Daml SDK
        run: dpm install 3.4.11

      - name: Verify toolchain
        run: |
          node_version="$(node --version)"
          case "$node_version" in
            v24.*) ;;
            *)
              echo "expected Node 24.x, got $node_version" >&2
              exit 1
              ;;
          esac

          dpm_version="$(dpm version --active)"
          if [[ "$dpm_version" != "3.4.11" ]]; then
            echo "expected DPM SDK 3.4.11, got $dpm_version" >&2
            exit 1
          fi

      - name: Install Node dependencies
        run: npm ci --ignore-scripts --audit=false --fund=false

      - name: Run local CI gates
        run: npm run ci
